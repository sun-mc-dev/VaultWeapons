# ==============================
#   VaultWeapons Configuration
# ==============================
# To add a new weapon, copy an existing block and change the key.
# Supported ability types: CROSSBOW_RELOAD, SWORD_SHARPNESS, NONE
# Recipe type: SHAPED (only SHAPED is currently supported)

weapons:

  vault_crossbow:
    type: CROSSBOW
    name: "&6Vault Crossbow"
    lore:
      - "&7A legendary crossbow forged in vault fire."
      - " "
      - "&ePassive: &fEach kill reduces reload time."
      - "&8Kills tracked in the weapon's soul."
    custom_model_data: 1001
    enchantments:
      unbreaking: 3
      multishot: 1
      infinity: 1
    ability:
      type: CROSSBOW_RELOAD
      base_reload_ticks: 25
      reduction_per_kill: 2
      min_reload_ticks: 1
    recipe:
      type: SHAPED
      shape:
        - "GGG"
        - "SCS"
        - "GGG"
      ingredients:
        G: GOLD_INGOT
        S: STRING
        C: CROSSBOW

  vault_sword:
    type: DIAMOND_SWORD
    name: "&bVault Sword"
    lore:
      - "&7A blade that grows with every kill."
      - " "
      - "&ePassive: &fEach kill increases Sharpness by 1."
      - "&8Max Sharpness: &c10"
    custom_model_data: 1002
    enchantments:
      sharpness: 1
    ability:
      type: SWORD_SHARPNESS
      max_sharpness: 10
    recipe:
      type: SHAPED
      shape:
        - " D "
        - "DDD"
        - " B "
      ingredients:
        D: DIAMOND
        B: BLAZE_ROD