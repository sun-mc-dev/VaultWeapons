# ==============================
#   VaultWeapons Configuration
# ==============================
# Ability types:
#   CROSSBOW_RELOAD  — kills reduce crossbow reload time
#   SWORD_SHARPNESS  — kills increase Sharpness by 1
#   LIFESTEAL        — kills heal the player (heal_amount: half-hearts × 2, e.g. 4.0 = 2 hearts)
#   SPEED_BOOST      — kills grant Speed effect (duration_ticks, amplifier: 1=SpeedI, 2=SpeedII)
#   LIGHTNING_STRIKE — kills strike visual lightning at the victim (no damage, no fire)
#   POISON_BLADE     — hits apply Poison to victim (duration_ticks, amplifier: 0=PoisonI)
#   NONE             — no ability

weapons:

  vault_crossbow:
    type: CROSSBOW
    name: "&6Vault Crossbow"
    lore:
      - "&7A legendary crossbow forged in vault fire."
      - " "
      - "&ePassive: &fEach kill reduces reload time."
      - "&8Kills tracked in the weapon's soul."
    custom_model_data: 1001
    enchantments:
      unbreaking: 3
      multishot: 1
      infinity: 1
    ability:
      type: CROSSBOW_RELOAD
      base_reload_ticks: 25
      reduction_per_kill: 2
      min_reload_ticks: 1
    recipe:
      type: SHAPED
      shape:
        - "GGG"
        - "SCS"
        - "GGG"
      ingredients:
        G: GOLD_INGOT
        S: STRING
        C: CROSSBOW

  vault_sword:
    type: DIAMOND_SWORD
    name: "&bVault Sword"
    lore:
      - "&7A blade that grows with every kill."
      - " "
      - "&ePassive: &fEach kill increases Sharpness by 1."
      - "&8Max Sharpness: &c10"
    custom_model_data: 1002
    enchantments:
      sharpness: 1
    ability:
      type: SWORD_SHARPNESS
      max_sharpness: 10
    recipe:
      type: SHAPED
      shape:
        - " D "
        - "DDD"
        - " B "
      ingredients:
        D: DIAMOND
        B: BLAZE_ROD

  soul_blade:
    type: GOLDEN_SWORD
    name: "&d&lSoul Blade"
    lore:
      - "&7Drains the life of those it slays."
      - " "
      - "&ePassive: &fKills restore &c2 hearts&f."
    custom_model_data: 1003
    enchantments:
      sharpness: 3
      unbreaking: 2
    ability:
      type: LIFESTEAL
      heal_amount: 4.0    # 4.0 half-hearts = 2 full hearts
    recipe:
      type: SHAPED
      shape:
        - " G "
        - "GNG"
        - " G "
      ingredients:
        G: GOLD_INGOT
        N: NETHER_STAR

  phantom_blade:
    type: NETHERITE_SWORD
    name: "&e&lPhantom Blade"
    lore:
      - "&7Move like a ghost after every kill."
      - " "
      - "&ePassive: &fKills grant &eSpeed II &ffor 5 seconds."
    custom_model_data: 1004
    enchantments:
      sharpness: 4
      unbreaking: 3
    ability:
      type: SPEED_BOOST
      duration_ticks: 100   # 5 seconds
      amplifier: 2          # 2 = Speed II (1 = Speed I)
    recipe:
      type: SHAPED
      shape:
        - " F "
        - "FNF"
        - " S "
      ingredients:
        F: FEATHER
        N: NETHERITE_INGOT
        S: STICK

  storm_sword:
    type: IRON_SWORD
    name: "&e&lStorm Sword"
    lore:
      - "&7The sky answers every kill."
      - " "
      - "&ePassive: &fKills summon lightning at the victim."
      - "&8Visual only — no fire, no damage."
    custom_model_data: 1005
    enchantments:
      sharpness: 2
      unbreaking: 2
    ability:
      type: LIGHTNING_STRIKE
    recipe:
      type: SHAPED
      shape:
        - " L "
        - " I "
        - " S "
      ingredients:
        L: LIGHTNING_ROD
        I: IRON_SWORD
        S: STICK

  venom_dagger:
    type: STONE_SWORD
    name: "&2&lVenom Dagger"
    lore:
      - "&7Every scratch festers."
      - " "
      - "&ePassive: &fHits apply &2Poison I &ffor 5 seconds."
    custom_model_data: 1006
    enchantments:
      sharpness: 1
      unbreaking: 1
    ability:
      type: POISON_BLADE
      duration_ticks: 100   # 5 seconds
      amplifier: 0          # 0 = Poison I
    recipe:
      type: SHAPED
      shape:
        - " S "
        - " P "
        - " T "
      ingredients:
        S: SPIDER_EYE
        P: POISONOUS_POTATO
        T: STICK