# ================================================
# VaultWeapons Messages Configuration
# Author: SunMC
# Version: 0.1-alpha
# Supports color codes with &
# ================================================

# Prefix for all messages
prefix: "&6[&eVaultWeapons&6] "

# General Messages
general:
  reload: "&aConfiguration reloaded successfully!"
  no-permission: "&cYou don't have permission to do this!"
  player-only: "&cThis command can only be executed by a player!"
  unknown-command: "&cUnknown command. Use /vw help for help."
  invalid-args: "&cInvalid arguments. Usage: %usage%"

# Weapon Messages
weapons:
  crafted: "&aYou have successfully crafted &e%weapon%&a!"
  crafting-started: "&7Crafting &e%weapon%&7..."
  not-enough-materials: "&cYou don't have enough materials to craft this weapon!"
  weapon-not-found: "&cWeapon not found: %weapon%"
  no-recipe: "&cNo recipe found for: %weapon%"

# Ability Messages
abilities:
  # Crossbow messages
  crossbow-reload-decrease: "&bReload time decreased! &7(Kills: %kills%)"
  crossbow-max-reload: "&aMaximum reload efficiency reached!"
  # Sword messages
  sword-sharpness-increase: "&cSharpness increased! &7(Level: %level%)"
  sword-max-sharpness: "&aMaximum sharpness reached!"

# Recipe GUI Messages
gui:
  recipe-title: "&8Recipe: %weapon%"
  click-to-craft: "&aClick to craft!"
  materials-required: "&7Materials Required:"
  has-materials: "&a✓ %amount%x %material%"
  missing-materials: "&c✗ %amount%x %material%"
  craft-success: "&aSuccessfully crafted %weapon%!"
  craft-failed: "&cFailed to craft %weapon%!"

# Help Messages
help:
  header: "&e========== &6VaultWeapons Help &e=========="
  footer: "&e====================================="
  commands:
    - "&e/vw reload &7- Reload the plugin configuration"
    - "&e/vw recipes &7- Open the recipes GUI"
    - "&e/vw give <player> <weapon> [amount] &7- Give a weapon to a player"
    - "&e/vw list &7- List all available weapons"
    - "&e/recipe [weapon] &7- View weapon recipes"
  weapons-header: "&eAvailable Weapons:"
  weapon-list: "&7- &e%weapon% &7- %description%"

# Title Messages (for crafting effects)
titles:
  craft-success:
    title: "&6&lWEAPON CRAFTED!"
    subtitle: "&eYou crafted %weapon%"
  craft-fail:
    title: "&c&lCRAFTING FAILED"
    subtitle: "&7Not enough materials"

# Admin Messages
admin:
  weapon-given: "&aGave %weapon% x%amount% to %player%."
  player-not-found: "&cPlayer not found: %player%"
  invalid-amount: "&cInvalid amount: %amount%"
