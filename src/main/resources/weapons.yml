# VaultWeapons Weapons Configuration
# Author: SunMC
# Version: 0.1-alpha
#
# This file defines all weapons in the plugin.
# You can add custom weapons by following the format below.
#
# Material types: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
# Enchantment types: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/enchantments/Enchantment.html
# Potion effect types: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/potion/PotionEffectType.html

weapons:
  # ============================================
  # Example Weapon Configuration
  # ============================================
  # weapon_id:
  #   name: "&6Custom Weapon Name"
  #   description: "A description of the weapon"
  #   material: DIAMOND_SWORD
  #   custom-model-data: 0  # Optional: for resource pack custom textures
  #   unbreakable: false
  #   enchants:
  #     SHARPNESS: 1
  #   abilities:
  #     type: KILL_EFFECT  # KILL_EFFECT, ON_HIT, ON_HOLD, PASSIVE
  #     effect: SHARPNESS_INCREASE  # Custom ability type
  #     value: 1  # Value for the ability
  #     max-value: 10  # Maximum value
  #   recipe:
  #     shape:
  #       - "DDD"
  #       - "DS "
  #       - " S "
  #     ingredients:
  #       D: DIAMOND
  #       S: STICK

  # ============================================
  # VAULT CROSSBOW
  # ============================================
  vault_crossbow:
    name: "&6&lVault Crossbow"
    description: "&eA legendary crossbow that becomes faster with each kill"
    material: CROSSBOW
    custom-model-data: 10001
    unbreakable: true
    lore:
      - ""
      - "&7A mystical crossbow forged in the"
      - "&7depths of the vault..."
      - ""
      - "&6Abilities:"
      - "&e• &bUnbreaking III &7- Never breaks"
      - "&e• &bMultishot &7- Fires 3 arrows"
      - "&e• &bInfinity &7- Infinite arrows"
      - "&e• &bSpeed Demon &7- Reload faster with each kill"
      - ""
      - "&7Kills: &e%kills% &7| &7Reload Bonus: &b%bonus%%"
    enchants:
      UNBREAKING: 3
      MULTISHOT: 1
      INFINITY: 1
    abilities:
      type: KILL_EFFECT
      effect: RELOAD_DECREASE
      # Amount to decrease reload time per kill (in game ticks, 20 ticks = 1 second)
      value: 4
      # Maximum reload decrease (in ticks)
      max-value: 40
      # Minimum reload time (in ticks)
      min-reload: 10
    recipe:
      shape:
        - "NBW"
        - "NCN"
        - " N "
      ingredients:
        N: NETHERITE_INGOT
        B: BOW
        W: WITHER_ROSE
        C: CROSSBOW
    nbt:
      # Custom NBT data for external plugin integration
      vault_weapon: true
      weapon_type: "crossbow"

  # ============================================
  # VAULT BLADE
  # ============================================
  vault_blade:
    name: "&c&lVault Blade"
    description: "&eA deadly blade that grows sharper with blood"
    material: DIAMOND_SWORD
    custom-model-data: 10002
    unbreakable: true
    lore:
      - ""
      - "&7An ancient blade that hungers for"
      - "&7battle and grows stronger..."
      - ""
      - "&6Abilities:"
      - "&e• &cUnbreaking III &7- Never breaks"
      - "&e• &cSharpness I &7- Base damage boost"
      - "&e• &cBlood Thirst &7- Gains sharpness on kills"
      - ""
      - "&7Kills: &e%kills% &7| &7Sharpness: &c%sharpness%"
    enchants:
      UNBREAKING: 3
      SHARPNESS: 1
    abilities:
      type: KILL_EFFECT
      effect: SHARPNESS_INCREASE
      # Sharpness level increase per kill
      value: 1
      # Maximum sharpness level
      max-value: 20
    recipe:
      shape:
        - " N "
        - "NDN"
        - "SBS"
      ingredients:
        N: NETHERITE_INGOT
        D: DIAMOND
        S: SOUL_SOIL
        B: BLAZE_ROD
    nbt:
      vault_weapon: true
      weapon_type: "sword"

# ============================================
# Recipe Display Settings
# ============================================
recipe-display:
  # Slot positions in the 3x3 crafting grid (0-8)
  # Layout: [0, 1, 2]
  #         [3, 4, 5]
  #         [6, 7, 8]
  crafting-slots:
    - 10
    - 11
    - 12
    - 19
    - 20
    - 21
    - 28
    - 29
    - 30

  # Result slot
  result-slot: 23

# ============================================
# Ability Configuration
# ============================================
ability-settings:
  # Save kill data to player data
  save-kill-data: true

  # Reset kill data on death
  reset-on-death: false

  # Maximum kills to track per weapon
  max-kills-tracked: 1000

  # Notify player on ability activation
  notify-on-ability: true